<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Save to Antri</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <strong>Antri</strong>
        <span>Browser saver</span>
      </header>
      <p>Capture the job page you are viewing and open a draft in Antri.</p>
      <button id="saveButton" type="button">Save current job</button>
      <output id="status" aria-live="polite">Open a job page, then save it to Antri.</output>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
