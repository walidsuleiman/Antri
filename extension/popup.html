<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Save to Antri</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="brand">
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
            <rect width="96" height="96" rx="22" fill="#0e1119"/>
            <path d="M24 72L45.4 24h5.2L72 72h-12.6l-4.1-10H40.5l-4.1 10H24Z" fill="#f4f7fb"/>
            <path d="M44.1 52h7.8L48 42.4 44.1 52Z" fill="#0e1119"/>
            <path d="M30 68c13.7-2.5 25.2-10.9 34-25" fill="none" stroke="#60a5fa" stroke-width="6" stroke-linecap="round"/>
            <circle cx="66" cy="38" r="5.5" fill="#60a5fa"/>
          </svg>
        </span>
        <div class="brand-text">
          <strong>Antri</strong>
          <span>Browser saver</span>
        </div>
        <span class="pro-badge">Pro</span>
      </header>

      <p class="hint">Capture the job page you're viewing and open a filled draft in Antri.</p>

      <button id="saveButton" class="btn btn-primary" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
        Save current job
      </button>

      <button id="actionButton" class="btn btn-ghost" type="button" hidden></button>

      <output id="status" aria-live="polite">Open a job page, then save it to Antri.</output>

      <footer class="foot">Powered by Antri Pro</footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
